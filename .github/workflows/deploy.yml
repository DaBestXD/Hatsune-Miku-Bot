name: Deploy Hatsune Miku Bot

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install "uv==0.11.3"
          uv sync --frozen

      - name: Run type checks
        run: |
          uv run ty check
          uv run ty check --error all --ignore missing-override-decorator

      - name: Check formatting
        run: uv run ruff format --check

      - name: Run lint checks
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_CLIENT_SECRET }}
          tags: tag:ci

      - name: Deploy on VM over Tailscale SSH
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" << 'EOF'
            set -e

            cd ~/Projects/Hatsune-Miku-Bot
            git fetch --no-tags origin "${{ github.sha }}"
            git checkout --force --detach "${{ github.sha }}"

            docker compose down
            docker compose up -d --build
          EOF
